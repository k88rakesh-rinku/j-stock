<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced ERP Inventory System - Pro Version</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; --success: #27ae60; --danger: #e74c3c; --edit: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 1750px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        .summary-wrapper { background: #fdfefe; border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 25px; }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-top: 10px; }
        .summary-card { background: #fff; border: 1px solid #ddd; padding: 10px; border-radius: 8px; text-align: center; border-bottom: 4px solid var(--primary); }
        .card-fresh { border-bottom: 4px solid var(--success); }
        .card-rework { border-bottom: 4px solid var(--edit); }
        .summary-card .count { font-size: 20px; font-weight: bold; color: var(--primary); }
        .forms-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-section { border: 1px solid #ddd; padding: 15px; border-radius: 10px; background: #fff; }
        .entry-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
        .sr-toggle-container { grid-column: span 3; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #fdf5e6; padding: 10px; border-radius: 6px; border: 1px solid #f39c12; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 90%; font-size: 12px; }
        .btn { padding: 10px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .table-area { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 1800px; }
        th { background: var(--primary); color: white; padding: 10px; font-size: 11px; }
        td { padding: 8px; border-bottom: 1px solid #eee; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <header><h2>Inventory Management - Pro ERP</h2></header>

    <div class="summary-wrapper">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h4>Dashboard Summary</h4>
            <select id="summaryMonthFilter" onchange="render()">
                <option value="ALL">ALL MONTHS (LIVE)</option>
                <option value="01">January</option><option value="02">February</option><option value="03">March</option>
                <option value="04">April</option><option value="05">May</option><option value="06">June</option>
                <option value="07">July</option><option value="08">August</option><option value="09">September</option>
                <option value="10">October</option><option value="11">November</option><option value="12">December</option>
            </select>
        </div>
        <div class="summary-zone-title">🟢 Fresh (NEW)</div>
        <div class="summary-grid" id="freshSummaryGrid"></div>
        <div class="summary-zone-title">🟡 Rework (OLD)</div>
        <div class="summary-grid" id="reworkSummaryGrid"></div>
    </div>

    <div class="forms-container">
        <div class="form-section">
            <h3>📥 STOCK IN</h3>
            <div class="entry-grid">
                <input type="hidden" id="edit-index-in">
                <div class="box"><label>Model</label><select id="in-model" onchange="applySmartAutoFill('IN')"></select></div>
                <div class="box"><label>Code</label><input type="text" id="in-code"></div>
                <div class="box"><label>Cond</label><select id="in-cond"><option value="NEW">NEW</option><option value="OLD">OLD (REWORK)</option></select></div>
                <div class="box"><label>From</label><input type="text" id="in-from"></div>
                <div class="box"><label>Bill No</label><input type="text" id="in-bill"></div>
                <div class="box"><label>Date</label><input type="date" id="in-date"></div>
                <div class="box"><label>Qty</label><input type="number" id="in-qty"></div>
                <div class="box"><label>Gate No</label><input type="text" id="in-gate"></div>
                <div class="box"><label>Track Sub Sr No?</label><select id="in-has-sr" onchange="toggleSrFields('IN')"><option value="NO">NO</option><option value="YES">YES</option></select></div>
                <div class="box" style="grid-column: span 2;"><label>Remarks</label><input type="text" id="in-remarks"></div>
                
                <div class="sr-toggle-container" id="in-sr-fields" style="display:none;">
                    <div class="box"><label>Main Sr</label><input type="text" id="in-sr-main"></div>
                    <div class="box"><label>Top Sr</label><input type="text" id="in-sr-top"></div>
                    <div class="box"><label>Child 1 Sr</label><input type="text" id="in-sr-c1"></div>
                    <div class="box"><label>Child 2 Sr</label><input type="text" id="in-sr-c2"></div>
                    <div class="box" style="grid-column: span 2;"><label>Bar Code</label><input type="text" id="in-sr-barcode"></div>
                </div>
            </div>
            <button class="btn" style="background:var(--success)" onclick="addItemToCart('IN')">Add to Cart</button>
            <button class="btn" style="background:var(--primary)" onclick="finalizeBill('IN')">Final & Save Bill</button>
        </div>

        <div class="form-section">
            <h3>📤 STOCK OUT</h3>
            <div class="entry-grid">
                <input type="hidden" id="edit-index-out">
                <div class="box"><label>Model</label><select id="out-model" onchange="applySmartAutoFill('OUT')"></select></div>
                <div class="box"><label>Code</label><input type="text" id="out-code"></div>
                <div class="box"><label>Cond</label><select id="out-cond"><option value="NEW">NEW</option><option value="OLD">OLD (REWORK)</option></select></div>
                <div class="box"><label>Bill No</label><input type="text" id="out-bill"></div>
                <div class="box"><label>Date</label><input type="date" id="out-date"></div>
                <div class="box"><label>Qty</label><input type="number" id="out-qty"></div>
                <div class="box"><label>Ship To</label><input type="text" id="out-ship"></div>
                <div class="box"><label>Track Sub Sr No?</label><select id="out-has-sr" onchange="toggleSrFields('OUT')"><option value="NO">NO</option><option value="YES">YES</option></select></div>
                <div class="box" style="grid-column: span 2;"><label>Remarks</label><input type="text" id="out-remarks"></div>
                
                <div class="sr-toggle-container" id="out-sr-fields" style="display:none;">
                    <div class="box"><label>Main Sr</label><input type="text" id="out-sr-main"></div>
                    <div class="box"><label>Top Sr</label><input type="text" id="out-sr-top"></div>
                    <div class="box"><label>Child 1 Sr</label><input type="text" id="out-sr-c1"></div>
                    <div class="box"><label>Child 2 Sr</label><input type="text" id="out-sr-c2"></div>
                    <div class="box" style="grid-column: span 2;"><label>Bar Code</label><input type="text" id="out-sr-barcode"></div>
                </div>
            </div>
            <button class="btn" style="background:var(--danger)" onclick="addItemToCart('OUT')">Add to Cart</button>
            <button class="btn" style="background:var(--primary)" onclick="finalizeBill('OUT')">Final & Save Bill</button>
        </div>
    </div>

    <div class="table-area">
        <table>
            <thead><tr><th>TYPE</th><th>MODEL</th><th>CODE</th><th>COND.</th><th>DATE</th><th>IN</th><th>OUT</th><th>REMARKS</th><th>SUB SR NOs</th><th>BAL</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('rakesh_edit_db')) || [];
    const models = ["SIEMENS", "ALSTOM", "15TR", "LHB", "RMHU", "TOUCH", "VVVFD", "INVERTER", "OTHER"];
    
    // UI Setup: Populate Models
    models.forEach(m => {
        document.getElementById('in-model').innerHTML += `<option value="${m}">${m}</option>`;
        document.getElementById('out-model').innerHTML += `<option value="${m}">${m}</option>`;
    });

    // Helper: Normalize strings to avoid Deficit Error due to spaces/case
    const norm = (s) => (s || "").toString().trim().toUpperCase();

    function applySmartAutoFill(type) {
        const p = type.toLowerCase();
        const model = document.getElementById(`${p}-model`).value;
        const codeInput = document.getElementById(`${p}-code`);
        const infoInput = type === 'IN' ? document.getElementById(`in-from`) : document.getElementById(`out-ship`);
        const rules = { "SIEMENS": "ACV 002", "ALSTOM": "ACV 003", "15TR": "ACH 208", "LHB": "GP0013 V2", "RMHU": "GP002", "TOUCH": "VT-GP0026", "VVVFD": "T18 660", "INVERTER": "T18 545" };
        const infoRules = { "SIEMENS": "VINYAS", "ALSTOM": "VINYAS", "15TR": "VINYAS", "LHB": "VINYAS", "RMHU": "VINYAS", "TOUCH": "VINYAS", "VVVFD": "HEX MOTO", "INVERTER": "HEX MOTO" };
        
        if (rules[model]) { codeInput.value = rules[model]; infoInput.value = infoRules[model] || ""; }
    }

    function toggleSrFields(type) {
        const p = type.toLowerCase();
        document.getElementById(`${p}-sr-fields`).style.display = document.getElementById(`${p}-has-sr`).value === 'YES' ? 'grid' : 'none';
    }

    function getStockBalance(model, code, cond) {
        let bal = 0;
        transactions.forEach(t => {
            if(norm(t.model) === norm(model) && norm(t.code) === norm(code) && norm(t.cond) === norm(cond)) {
                if(t.type === 'IN') bal += t.qty;
                else bal -= t.qty;
            }
        });
        return bal;
    }

    let billCarts = { IN: [], OUT: [] };

    function addItemToCart(type) {
        const p = type.toLowerCase();
        const f = document.querySelector(`.form-section.${p === 'in' ? 'in' : 'out'}`);
        
        let item = {
            type: type,
            model: document.getElementById(`${p}-model`).value,
            code: norm(document.getElementById(`${p}-code`).value),
            cond: document.getElementById(`${p}-cond`).value,
            qty: parseInt(document.getElementById(`${p}-qty`).value) || 0,
            bill: document.getElementById(`${p}-bill`).value.trim(),
            date: document.getElementById(`${p}-date`).value,
            remarks: document.getElementById(`${p}-remarks`).value.trim() || "-",
            // SR Details
            hasSr: document.getElementById(`${p}-has-sr`).value,
            srMain: document.getElementById(`${p}-sr-main`)?.value || "-",
            srTop: document.getElementById(`${p}-sr-top`)?.value || "-",
            srC1: document.getElementById(`${p}-sr-c1`)?.value || "-",
            srC2: document.getElementById(`${p}-sr-c2`)?.value || "-",
            barcode: document.getElementById(`${p}-sr-barcode`)?.value || "-"
        };

        if(type === 'OUT') {
            let available = getStockBalance(item.model, item.code, item.cond);
            let inCart = 0;
            billCarts.OUT.forEach(c => { if(norm(c.model) === norm(item.model) && norm(c.code) === norm(item.code) && c.cond === item.cond) inCart += c.qty; });
            if(item.qty > (available - inCart)) return alert(`Stock Deficit! Available: ${available - inCart}`);
        }

        billCarts[type].push(item);
        alert("Added to Cart!");
        f.querySelectorAll('input:not([type="hidden"])').forEach(i => i.value = "");
    }

    function finalizeBill(type) {
        if(billCarts[type].length === 0) return alert("Cart Empty!");
        transactions.push(...billCarts[type]);
        localStorage.setItem('rakesh_edit_db', JSON.stringify(transactions));
        billCarts[type] = [];
        render();
        alert("Saved!");
    }

    function render() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        
        // Month filter logic
        const sMonth = document.getElementById('summaryMonthFilter').value;
        
        transactions.forEach((t) => {
            let bal = getStockBalance(t.model, t.code, t.cond);
            // Render logic here
            tbody.innerHTML += `<tr><td>${t.type}</td><td>${t.model}</td><td>${t.code}</td><td>${t.cond}</td><td>${t.date}</td><td>${t.type==='IN'?t.qty:'-'}</td><td>${t.type==='OUT'?t.qty:'-'}</td><td>${t.remarks}</td><td>${t.srMain || '-'}</td><td>${bal}</td></tr>`;
        });
    }

    render();
</script>
</body>
</html>

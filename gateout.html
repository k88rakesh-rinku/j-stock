<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gate Out - Pro Control System (Live Cloud)</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
<div class="container">
    <div class="erp-header">
        <h1>Material Lifecycle Control & Inventory Ledger Systems <span style="font-size:12px; color:#4ade80;">● CLOUD LIVE</span></h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    
    <div class="tabs-nav">
        <a href="index.html" class="tab-link">📦 New Entry (Fresh)</a>
        <a href="rework.html" class="tab-link">🛠️ Gate In (Rework)</a>
        <a href="gateout.html" class="tab-link active-debit" style="background-color: var(--primary); color: white;">🚪 Gate Out (Dispatch)</a>
        <a href="debit.html" class="tab-link">🧾 Debit Note (Vendor)</a>
        <a href="code.html" class="tab-link">🆕 Generate Code</a>
        <a href="ledger.html" class="tab-link">📊 Master Ledger & History</a>
        <a href="users.html" class="tab-link">👥 Manage Users</a>
    </div>

    <h3 style="color:var(--primary); margin: 0 0 10px 0;">🚪 Material Gate Out / Dispatch Log</h3>
    <form id="gateoutForm">
        <div class="form-grid">
            <div class="form-group"><label>Dispatch Date <span>*</span></label><input type="date" id="goDate" required></div>
            <div class="form-group"><label>Invoice / GP No <span>*</span></label><input type="text" id="goInvoice" required autocomplete="off" style="text-transform:uppercase;"></div>
            <div class="form-group"><label>Stock Type <span>*</span></label>
                <select id="goStockType" required>
                    <option value="FRESH">Fresh Production Stock</option>
                    <option value="REWORK">Repaired / Rework Stock</option>
                </select>
            </div>
            <div class="form-group"><label>Model Code <span>*</span></label><input type="text" id="goCode" oninput="autofillGateout(this)" required autocomplete="off" style="text-transform:uppercase;"></div>
            <div class="form-group"><label>Item Name</label><input type="text" id="goName" readonly style="background:#f1f5f9;"></div>
            <div class="form-group"><label>Dispatch Qty (Sets) <span>*</span></label><input type="number" min="1" id="goQty" required></div>
        </div>
        <button type="submit" class="btn-submit" style="margin-top:15px; width:100%;">Dispatched & Save to Cloud</button>
    </form>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCAOXbPwuFR3wh1QSLBXWsodupKWoRYmqs",
        authDomain: "gvm-stock-control.firebaseapp.com",
        databaseURL: "https://gvm-stock-control-default-rtdb.firebaseio.com",
        projectId: "gvm-stock-control",
        storageBucket: "gvm-stock-control.firebasestorage.app",
        messagingSenderId: "202991207119",
        appId: "1:202991207119:web:2246ffb7b92f9eb0c4adba"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    if(!localStorage.getItem('activeSession')) { window.location.href = 'login.html'; }
    function logout() { localStorage.removeItem('activeSession'); window.location.href = 'login.html'; }

    let masterCatalog = JSON.parse(localStorage.getItem('systemMasterCatalog')) || {};

    function autofillGateout(input) {
        let code = input.value.trim().toUpperCase(); let name = "";
        for(let key in masterCatalog) { const m = masterCatalog[key].find(i=>i.code===code); if(m) name = m.name; }
        document.getElementById('goName').value = name;
    }

    document.getElementById('gateoutForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const entry = {
            date: document.getElementById('goDate').value,
            invoiceNo: document.getElementById('goInvoice').value.trim().toUpperCase(),
            stockType: document.getElementById('goStockType').value,
            modelCode: document.getElementById('goCode').value.trim().toUpperCase(),
            name: document.getElementById('goName').value,
            outQty: parseInt(document.getElementById('goQty').value)
        };

        database.ref('dispatchStock').push(entry).then(() => {
            alert("🎉 Gate Out Dispatch Record Saved to Cloud!");
            document.getElementById('gateoutForm').reset();
            applyDate();
        });
    });

    function applyDate() { document.getElementById('goDate').value = new Date().toISOString().split('T')[0]; }
    applyDate();
</script>
</body>
</html>

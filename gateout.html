<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gate Out Dispatch - Control System</title>
    <link rel="stylesheet" href="style.css">
    </head>
<body>
<div class="container">
    <script>
        // गेट-आउट का सबमिट वाला हिस्सा (यहाँ ध्यान दें)
        document.getElementById('gateoutForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 1. फ्रेश स्टॉक और रिवर्क डेटा को यहाँ ताजा लोड करें (Local Storage से)
            let stockData = JSON.parse(localStorage.getItem('freshStockData')) || [];
            let reworkData = JSON.parse(localStorage.getItem('reworkStockData')) || [];
            
            let items = []; 
            let deficit = false;
            let rows = document.querySelectorAll('#gateoutItemsBody tr');

            for(let row of rows) {
                const pool = row.querySelector('.go-pool-type').value;
                const code = row.querySelector('.go-code').value.trim().toUpperCase();
                const qty = parseInt(row.querySelector('.go-qty').value) || 0;

                if(pool === 'FRESH') {
                    let match = stockData.find(s => s.modelCode && s.modelCode.toUpperCase() === code);
                    let current = match ? parseInt(match.qty || match.inQty || 0) : 0;
                    if(current < qty) { 
                        alert("🚨 Deficit in Fresh Pool: " + code); 
                        deficit = true; break; 
                    }
                    if(match.qty !== undefined) match.qty -= qty; else match.inQty -= qty;
                } else {
                    // Rework logic
                    let totalRework = 0;
                    reworkData.forEach(r => r.gridItems.forEach(gi => { if(gi.itemShort === code) totalRework += parseInt(gi.qty); }));
                    if(totalRework < qty) { alert("🚨 Deficit in Rework Pool: " + code); deficit = true; break; }
                    
                    let rem = qty;
                    for(let r of reworkData) {
                        for(let gi of r.gridItems) {
                            if(gi.itemShort === code && gi.qty > 0) {
                                let take = Math.min(gi.qty, rem);
                                gi.qty -= take; rem -= take;
                            }
                        }
                    }
                }
                if(!deficit) items.push({ pool, code, qty });
            }

            if(!deficit) {
                localStorage.setItem('freshStockData', JSON.stringify(stockData));
                localStorage.setItem('reworkStockData', JSON.stringify(reworkData));
                alert("🎉 Success!");
                location.reload();
            }
        });
    </script>
</div>
</body>
</html>

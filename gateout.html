<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gate Out Dispatch - Control System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .btn-edit-action { background-color: #0284c7; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; margin-right: 4px; }
        .btn-delete-action { background-color: #dc2626; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .btn-print-receipt { background-color: #007bff; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }
        
        @media print {
            body * { visibility: hidden; }
            #printSection, #printSection * { visibility: visible; }
            #printSection { position: absolute; left: 0; top: 0; width: 210mm; padding: 10mm; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="erp-header">
        <h1>Material Lifecycle Control & Inventory Ledger Systems</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    
    <div class="tabs-nav">
        <a href="index.html" class="tab-link">📦 New Entry</a>
        <a href="gateout.html" class="tab-link" style="background-color: #1e3a8a; color: white;">🚪 Gate Out (Dispatch)</a>
        <a href="ledger.html" class="tab-link">📊 Master Ledger</a>
    </div>

    <form id="gateoutForm">
        <input type="hidden" id="editRowIndex" value="-1">
        <div class="form-grid">
            <div class="form-group"><label>Dispatch Date</label><input type="date" id="goDate" required></div>
            <div class="form-group"><label>Vehicle No</label><input type="text" id="goVehicleNo" required></div>
            <div class="form-group"><label>Target Party</label><input type="text" id="goPartyName" required></div>
            <div class="form-group"><label>Shipping Location</label><input type="text" id="goDeliveryShipping" required></div>
        </div>

        <table class="grid-table">
            <thead><tr><th>Pool</th><th>Code</th><th>Item Name</th><th>Qty</th><th>Action</th></tr></thead>
            <tbody id="gateoutItemsBody"></tbody>
        </table>
        <button type="button" class="btn-row-add" onclick="addGoRow()">+</button>
        <button type="submit" class="btn-submit" style="margin-top:15px; width:100%;">Authorize Gate Out (Deduct Stock)</button>
    </form>

    <table class="history-table" style="margin-top:20px;">
        <thead><tr><th>Voucher</th><th>Date</th><th>Party</th><th>Items</th><th>Action</th></tr></thead>
        <tbody id="goHistoryBody"></tbody>
    </table>
</div>

<div id="printSection"></div>

<script>
    // डेटा लोड करें
    let stockData = JSON.parse(localStorage.getItem('freshStockData')) || [];
    let reworkData = JSON.parse(localStorage.getItem('reworkStockData')) || [];
    let gateoutData = JSON.parse(localStorage.getItem('gateoutStockData')) || [];
    let masterCatalog = JSON.parse(localStorage.getItem('systemMasterCatalog')) || {};

    function addGoRow() {
        const body = document.getElementById('gateoutItemsBody');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><select class="go-pool-type"><option value="FRESH">FRESH</option><option value="REWORK">REWORK</option></select></td>
            <td><input type="text" class="go-code" oninput="autofillGo(this)"></td>
            <td><input type="text" class="go-name"></td>
            <td><input type="number" class="go-qty"></td>
            <td><button type="button" class="btn-row-remove" onclick="this.closest('tr').remove()">×</button></td>`;
        body.appendChild(tr);
    }

    function autofillGo(input) {
        let code = input.value.trim().toUpperCase();
        for(let key in masterCatalog) {
            const m = masterCatalog[key].find(i => i.code === code);
            if(m) input.closest('tr').querySelector('.go-name').value = m.name;
        }
    }

    document.getElementById('gateoutForm').addEventListener('submit', function(e) {
        e.preventDefault();
        let items = [];
        let rows = document.querySelectorAll('#gateoutItemsBody tr');
        
        // स्टॉक वेरिफिकेशन (Deficit चेक)
        for(let row of rows) {
            const pool = row.querySelector('.go-pool-type').value;
            const code = row.querySelector('.go-code').value.trim().toUpperCase();
            const qty = parseInt(row.querySelector('.go-qty').value) || 0;

            if(pool === 'FRESH') {
                let match = stockData.find(s => s.modelCode === code);
                let current = match ? parseInt(match.qty || match.inQty || 0) : 0;
                if(current < qty) { alert("🚨 Deficit in Fresh Pool: " + code); return; }
                if(match.qty !== undefined) match.qty -= qty; else match.inQty -= qty;
            } else {
                // Rework Pool Logic
                let total = 0;
                reworkData.forEach(r => r.gridItems.forEach(gi => { if(gi.itemShort === code) total += parseInt(gi.qty); }));
                if(total < qty) { alert("🚨 Deficit in Rework Pool: " + code); return; }
                
                let rem = qty;
                for(let r of reworkData) {
                    for(let gi of r.gridItems) {
                        if(gi.itemShort === code && gi.qty > 0) {
                            let canTake = Math.min(gi.qty, rem);
                            gi.qty -= canTake; rem -= canTake;
                        }
                    }
                }
            }
            items.push({ pool, code, name: row.querySelector('.go-name').value, qty });
        }

        // सेव करें
        localStorage.setItem('freshStockData', JSON.stringify(stockData));
        localStorage.setItem('reworkStockData', JSON.stringify(reworkData));
        
        gateoutData.push({ voucherNo: gateoutData.length + 1, date: document.getElementById('goDate').value, partyName: document.getElementById('goPartyName').value, gridItems: items });
        localStorage.setItem('gateoutStockData', JSON.stringify(gateoutData));
        
        alert("Authorized!");
        location.reload();
    });

    addGoRow();
</script>
</body>
</html>

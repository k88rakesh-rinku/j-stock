<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gate Out Dispatch - Control System</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        /* [आपका CSS पहले जैसा ही है, वही रखें] */
        .btn-edit-action { background-color: #0284c7; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .btn-delete-action { background-color: #dc2626; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .btn-print-receipt { background-color: #007bff; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="erp-header"><h1>Material Lifecycle Control & Inventory Ledger Systems</h1></div>
    
    <form id="gateoutForm">
        <input type="hidden" id="editRowIndex" value="-1">
        <input type="hidden" id="editFirebaseKey" value="">
        <div class="form-grid">
            <div class="form-group"><label>Dispatch Trans Date <span>*</span></label><input type="date" id="goDate" required></div>
            <div class="form-group"><label>Vehicle Transport No <span>*</span></label><input type="text" id="goVehicleNo" required autocomplete="off" style="text-transform:uppercase;"></div>
            <div class="form-group"><label>Doc Type & Number <span>*</span></label>
                <div class="go-doc-group">
                    <select id="goDocType"><option value="BILL">BILL</option><option value="CHALLAN">CHALLAN</option></select>
                    <input type="text" id="goDocNo" required placeholder="Doc No..." autocomplete="off">
                </div>
            </div>
            <div class="form-group"><label>Delivery Shipping Location <span>*</span></label><input type="text" id="goDeliveryShipping" required autocomplete="off" style="text-transform:uppercase;"></div>
            <div class="form-group"><label>Send / Dispatched By</label><input type="text" id="goSendBy" autocomplete="off" style="text-transform:uppercase;"></div>
        </div>

        <div style="overflow-x:auto; margin-top: 15px;">
            <table class="grid-table">
                <thead><tr><th>Pool</th><th>Code</th><th>Item Name</th><th>Qty</th><th>Unit</th><th>S/N Track</th><th>Action</th></tr></thead>
                <tbody id="gateoutItemsBody"></tbody>
            </table>
        </div>
        <button type="button" class="btn-row-add" onclick="addGoRow()">+</button>
        <button type="submit" id="btnSubmitForm" class="btn-submit" style="margin-top:15px; width: 100%;">Authorize Gate Out</button>
    </form>
    <div id="goHistoryBody"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCAOXbPwuFR3wh1QSLBXWsodupKWoRYmqs", databaseURL: "https://gvm-stock-control-default-rtdb.firebaseio.com", projectId: "gvm-stock-control" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let stockData = [], gateoutData = [], reworkStockData = [], bomFormulaList = [];
    const cleanStr = (str) => String(str || "").trim().toUpperCase().replace(/[\s\-]+/g, '');

    // डेटा सिंक
    database.ref('freshStockVouchers').on('value', s => stockData = Object.values(s.val() || {}));
    database.ref('reworkStockVouchers').on('value', s => reworkStockData = Object.values(s.val() || {}));
    database.ref('bomMasterData').on('value', s => bomFormulaList = Object.values(s.val() || {}));
    database.ref('gateoutStockData').on('value', s => gateoutData = Object.entries(s.val() || {}).map(([k, v]) => ({fbKey: k, ...v})));

    // 🌟 महा-फिक्स: स्टॉक कैलकुलेटर
    function calculateLiveFreshStock(targetCode, skipFbKey = "") {
        let totalIn = 0; let totalOut = 0; let cleanedTarget = cleanStr(targetCode);
        
        // 1. Fresh Inward से माल जोड़ें
        stockData.forEach(v => {
            Object.values(v.gridItems || []).forEach(item => {
                if(cleanStr(item.modelCode || item.code || "") === cleanedTarget) totalIn += parseFloat(item.qty || 0);
            });
        });

        // 2. Rework/Fresh Gate In से 'FRESH' पूल का माल जोड़ें
        reworkStockData.forEach(v => {
            Object.values(v.gridItems || []).forEach(item => {
                if(cleanStr(item.pool) === "FRESH" && cleanStr(item.itemShort || item.code || "") === cleanedTarget) totalIn += parseFloat(item.qty || 0);
            });
        });

        // 3. Gate Out (बाकी सब माइनस)
        gateoutData.forEach(g => {
            if(skipFbKey && g.fbKey === skipFbKey) return;
            Object.values(g.gridItems || []).forEach(item => {
                if(item.pool === 'FRESH' && cleanStr(item.code) === cleanedTarget) totalOut += parseFloat(item.qty || 0);
                
                let bom = bomFormulaList.find(b => cleanStr(b.mainCode) === cleanStr(item.code));
                if(bom && bom.accessories) {
                    bom.accessories.forEach(acc => {
                        if(cleanStr(acc.code) === cleanedTarget) totalOut += (parseFloat(acc.qty) * parseFloat(item.qty || 0));
                    });
                }
            });
        });
        return Math.max(0, totalIn - totalOut); // माइनस नहीं जाने देगा
    }

    document.getElementById('gateoutForm').addEventListener('submit', function(e) {
        e.preventDefault();
        let rows = document.querySelectorAll('#gateoutItemsBody tr');
        let deficit = false;
        let report = [];

        // चेक करो
        for(let row of rows) {
            let code = cleanStr(row.querySelector('.go-code').value);
            let qty = parseFloat(row.querySelector('.go-qty').value) || 0;
            if(row.querySelector('.go-pool-type').value === 'FRESH') {
                let avail = calculateLiveFreshStock(code, document.getElementById('editFirebaseKey').value);
                if(avail < qty) {
                    report.push(`Item ${code}: Req ${qty}, Avail ${avail.toFixed(2)}`);
                    deficit = true;
                }
            }
        }

        if(deficit) {
            alert("🚫 STOP! स्टॉक कम है:\n" + report.join('\n'));
            return;
        }

        // सब सही है तो Firebase पर सेव करें (Submit Logic)
        alert("🎉 Success! Stock Authorized.");
        location.reload();
    });

    function addGoRow() { /* [रो जोड़ने का कोड वैसे ही रखें] */ }
    applyLiveDateRestrictions(); addGoRow();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Entry - Pro Control System (Live Cloud)</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
<div class="container">
    <div class="erp-header">
        <h1>Material Lifecycle Control & Inventory Ledger Systems <span style="font-size:12px; color:#4ade80;">● CLOUD LIVE</span></h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    
    <div class="tabs-nav">
        <a href="index.html" class="tab-link active-debit" style="background-color: var(--primary); color: white;">📦 New Entry (Fresh)</a>
        <a href="rework.html" class="tab-link">🛠️ Gate In (Rework)</a>
        <a href="gateout.html" class="tab-link">🚪 Gate Out (Dispatch)</a>
        <a href="debit.html" class="tab-link">🧾 Debit Note (Vendor)</a>
        <a href="code.html" class="tab-link">🆕 Generate Code</a>
        <a href="ledger.html" class="tab-link">📊 Master Ledger & History</a>
        <a href="users.html" class="tab-link">👥 Manage Users</a>
    </div>

    <h3 style="color:var(--primary); margin: 0 0 10px 0;">📦 Fresh Production Entry</h3>
    <form id="freshForm">
        <div class="form-grid">
            <div class="form-group"><label>Entry Date <span>*</span></label><input type="date" id="frDate" required></div>
            <div class="form-group"><label>Lot/Batch Number <span>*</span></label><input type="text" id="frLotNo" required autocomplete="off" style="text-transform:uppercase;"></div>
            <div class="form-group"><label>Model Code <span>*</span></label><input type="text" id="frCode" oninput="autofillFresh(this)" required autocomplete="off" style="text-transform:uppercase;"></div>
            <div class="form-group"><label>Item Name</label><input type="text" id="frName" readonly style="background:#f1f5f9;"></div>
            <div class="form-group"><label>Quantity (Sets) <span>*</span></label><input type="number" min="1" id="frQty" required></div>
        </div>
        <button type="submit" class="btn-submit" style="margin-top:15px; width:100%;">Save Entry to Cloud Stock</button>
    </form>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCAOXbPwuFR3wh1QSLBXWsodupKWoRYmqs",
        authDomain: "gvm-stock-control.firebaseapp.com",
        databaseURL: "https://gvm-stock-control-default-rtdb.firebaseio.com",
        projectId: "gvm-stock-control",
        storageBucket: "gvm-stock-control.firebasestorage.app",
        messagingSenderId: "202991207119",
        appId: "1:202991207119:web:2246ffb7b92f9eb0c4adba"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    if(!localStorage.getItem('activeSession')) { window.location.href = 'login.html'; }
    function logout() { localStorage.removeItem('activeSession'); window.location.href = 'login.html'; }

    let masterCatalog = JSON.parse(localStorage.getItem('systemMasterCatalog')) || {};

    function autofillFresh(input) {
        let code = input.value.trim().toUpperCase(); let name = "";
        for(let key in masterCatalog) { const m = masterCatalog[key].find(i=>i.code===code); if(m) name = m.name; }
        document.getElementById('frName').value = name;
    }

    document.getElementById('freshForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const entry = {
            date: document.getElementById('frDate').value,
            lotNo: document.getElementById('frLotNo').value.trim().toUpperCase(),
            modelCode: document.getElementById('frCode').value.trim().toUpperCase(),
            name: document.getElementById('frName').value,
            qty: parseInt(document.getElementById('frQty').value)
        };

        // क्लाउड डेटाबेस पर पुश
        database.ref('freshStock').push(entry).then(() => {
            alert("🎉 Fresh Entry Saved to Cloud Stock!");
            document.getElementById('freshForm').reset();
            applyDate();
        });
    });

    function applyDate() { document.getElementById('frDate').value = new Date().toISOString().split('T')[0]; }
    applyDate();
</script>
</body>
</html>

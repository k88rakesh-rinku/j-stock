<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gate In (Rework/Fresh) - Control System</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
<div class="container">
    <h3 id="formTitleRework" style="color:var(--primary); margin: 15px 0 10px 0;">🛠️ Gate In (Rework/Fresh) Ledger</h3>
    <form id="reworkForm">
        <input type="hidden" id="editRowIndex" value="-1">
        <input type="hidden" id="editFirebaseKey" value="">
        <div id="dynamicItemsBody"></div>
        <button type="submit" id="btnSubmitForm" class="btn-submit">Save Gate In Entry</button>
    </form>

    <div class="table-filter-panel">
        <input type="text" id="liveTableSearchBox" class="search-input-box" placeholder="🔍 Search..." oninput="renderHistory()">
    </div>

    <table class="history-table">
        <thead><tr><th>Date</th><th>From Party</th><th>Challan / Gate No</th><th>Items Details</th><th>Action Controls</th></tr></thead>
        <tbody id="reworkHistoryBody"></tbody>
    </table>
</div>

<script>
    // [Firebase Config वही रखें]
    // 🌟 यहाँ मुख्य लॉजिक है जो लेजर से कनेक्ट होगा
    function renderHistory() {
        const b = document.getElementById('reworkHistoryBody'); b.innerHTML = '';
        
        reworkData.forEach((r, idx) => {
            let desc = "";
            (r.gridItems || []).forEach(i => {
                desc += `• [<b>${i.pool || 'REWORK'}</b>] <code>${i.itemShort}</code> - ${i.itemName} (<b>${i.qty} ${i.unit}</b>)<br>`;
            });

            b.innerHTML += `<tr>
                <td>${r.date}</td>
                <td><b>${r.partyName}</b></td>
                <td>${r.billNo}</td>
                <td style="text-align:left;">${desc}</td>
                <td>
                    <button class="btn-print-receipt" onclick='triggerPrintPass(${JSON.stringify(r)})'>🖨️ Print</button>
                    <button class="btn-edit-action" onclick="editReworkRow(${idx})">Edit</button>
                    <button class="btn-delete-action" onclick="deleteReworkRow(${idx})">Delete</button>
                </td>
            </tr>`;
        });
    }

    // बाकी सारे Functions (Edit, Delete, Print, Excel) यहाँ नीचे वैसे ही पेस्ट करें 
    // जैसे मैंने पिछली बार दिए थे, ये सब आपके Ledger/Firebase से जुड़ गए हैं।
    // जब आप Gate Out (Dispatch) करेंगे, तो वो सीधे reworkStockVouchers को चेक करेगा!
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Authentication - Live Cloud</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body style="background-color: #0f172a;">

<div class="login-wrapper" style="margin-top: 120px;">
    <h2>j stock - ERP Login</h2>
    <div style="background-color: #f8d7da; color: #721c24; font-weight: bold; text-align: center; margin-bottom: 15px; padding: 10px; border-radius: 4px; border: 1px solid #f5c6cb; display: none;" id="loginError">
        ❌ Access Denied: Invalid ID or Password!
    </div>
    
    <div class="form-group" style="margin-bottom: 18px;">
        <label>User ID</label>
        <input type="text" id="loginUser" required autocomplete="off" style="text-transform:lowercase;">
    </div>
    <div class="form-group" style="margin-bottom: 25px;">
        <label>Password</label>
        <input type="password" id="loginPassword" required>
    </div>
    <button class="login-btn" onclick="checkLogin()">Authenticate</button>
</div>

<script>
    // 🎯 फायरबेस कॉन्फ़िगरेशन चाबी
    const firebaseConfig = {
        apiKey: "AIzaSyCAOXbPwuFR3wh1QSLBXWsodupKWoRYmqs",
        authDomain: "gvm-stock-control.firebaseapp.com",
        databaseURL: "https://gvm-stock-control-default-rtdb.firebaseio.com",
        projectId: "gvm-stock-control",
        storageBucket: "gvm-stock-control.firebasestorage.app",
        messagingSenderId: "202991207119",
        appId: "1:202991207119:web:2246ffb7b92f9eb0c4adba"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // सुरक्षा जांच नियम (क्लाउड सिंक के साथ)
    function checkLogin() {
        const u = document.getElementById('loginUser').value.trim().toLowerCase();
        const p = document.getElementById('loginPassword').value;
        const err = document.getElementById('loginError');
        err.style.display = 'none'; // हर क्लिक पर पहले एरर छुपाएं

        if (!u || !p) { alert("Please enter both User ID and Password!"); return; }

        // 🛡️ 1. मास्टर सुरक्षा चक्र: आपका अपना फिक्स क्रेडेंशियल (इंटरनेट न होने पर भी बैकअप की तरह काम करेगा)
        if(u === "k88rakesh" && p === "Rinku@7004") {
            const sessionObj = {
                userId: u,
                permissions: { add: true, debit: true, excel: true, gencode: true, users: true }
            };
            localStorage.setItem('activeSession', JSON.stringify(sessionObj));
            window.location.href = 'index.html'; 
            return;
        }

        // 🔄 2. क्लाउड वेरिफिकेशन चक्र: स्टाफ यूज़र्स के लिए फायरबेस से लाइव चेकिंग
        database.ref('systemUserRegistry').once('value').then((snapshot) => {
            const usersData = snapshot.val();
            let isAuthenticated = false;
            let loggedInUser = null;

            if(usersData) {
                for(let key in usersData) {
                    if(usersData[key].userId === u && usersData[key].password === p) {
                        isAuthenticated = true;
                        loggedInUser = usersData[key];
                        break;
                    }
                }
            }

            if(isAuthenticated && loggedInUser) {
                // क्लाउड से स्टाफ की Assigned Permissions को सेशन में लोड करना
                const sessionObj = {
                    userId: loggedInUser.userId,
                    permissions: loggedInUser.permissions || { add: true, debit: true, excel: true, gencode: true, users: false }
                };
                localStorage.setItem('activeSession', JSON.stringify(sessionObj));
                window.location.href = 'index.html'; // सही लॉगिन होते ही सीधे मुख्य सिस्टम पर डाइव करेगा
            } else {
                err.style.display = 'block'; // गलत क्रेडेंशियल होने पर रेड एरर एक्टिवेट होगा
            }
        }).catch((error) => {
            console.error("Firebase Database Error: ", error);
            alert("Database connection timeout. Please check your network connection.");
        });
    }

    // एंटर बटन दबाने पर भी लॉगिन हो जाए, उसके लिए शॉर्टकट कुंजी
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') { checkLogin(); }
    });
</script>
</body>
</html>

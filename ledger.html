<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Ledger & Stock Control</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        .ledger-tabs { display: flex; gap: 10px; margin: 20px 0 15px 0; border-bottom: 2px solid #cbd5e1; padding-bottom: 8px; }
        .ledger-tab-btn { padding: 10px 20px; font-size: 14px; font-weight: bold; border: none; background: #e2e8f0; color: #475569; border-radius: 6px; cursor: pointer; }
        .ledger-tab-btn.active { background: #1e3a8a; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .control-panel { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 12px 18px; border: 1px solid #cbd5e1; border-radius: 6px; margin-bottom: 15px; gap: 15px; flex-wrap: wrap; }
        .search-box { padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 13px; width: 280px; text-transform: uppercase; }
        .select-filter { padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 13px; font-weight: bold; background: #fff; cursor: pointer; }
        .badge-stock { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 13px; }
        code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-weight: bold; color: #0f172a; }
    </style>
</head>
<body>
<div class="container">
    <div class="erp-header">
        <h1>Material Lifecycle Control & Inventory Ledger Systems</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    
    <div class="tabs-nav">
        <a href="index.html">📦 New Entry</a>
        <a href="rework.html">🛠️ Gate In (Rework)</a>
        <a href="gateout.html">🚪 Gate Out</a>
        <a href="ledger.html" style="background:#1e3a8a; color:white; font-weight:bold;">📊 Master Ledger</a>
    </div>

    <div class="ledger-tabs">
        <button class="ledger-tab-btn active" onclick="switchLedgerTab('po-tab', this)">📊 PO Matrix</button>
        <button class="ledger-tab-btn" onclick="switchLedgerTab('stock-tab', this)">🏬 Fresh Stock</button>
        <button class="ledger-tab-btn" onclick="switchLedgerTab('rework-tab', this)">🛠️ Rework Stock</button>
    </div>

    <div id="po-tab" class="tab-content active">
        <div class="control-panel">
            <input type="text" id="poSearchBox" class="search-box" placeholder="🔍 Search..." oninput="renderPoLedgerTable()">
            <select id="poStatusDropdown" class="select-filter" onchange="renderPoLedgerTable()">
                <option value="ACTIVE">Active PO</option>
                <option value="ALL">All PO</option>
            </select>
        </div>
        <table class="history-table">
            <thead><tr><th>PO No</th><th>Code</th><th>Item Name</th><th>Total PO</th><th>Received</th><th>Pending</th></tr></thead>
            <tbody id="poLedgerItemsBody"></tbody>
        </table>
    </div>

    <div id="stock-tab" class="tab-content">
        <div class="control-panel">
            <input type="text" id="stockSearchBox" class="search-box" placeholder="🔍 Search Fresh..." oninput="renderPhysicalStockTable()">
        </div>
        <table class="history-table">
            <thead><tr><th>Code</th><th>Name</th><th>Inward</th><th>Outward</th><th>Live Stock</th></tr></thead>
            <tbody id="physicalStockBody"></tbody>
        </table>
    </div>

    <div id="rework-tab" class="tab-content">
        <div class="control-panel">
            <input type="text" id="reworkSearchBox" class="search-box" placeholder="🔍 Search Rework..." oninput="renderReworkStockTable()">
        </div>
        <table class="history-table">
            <thead><tr><th>Code</th><th>Name</th><th>Gate In</th><th>Dispatched</th><th>Live Stock</th></tr></thead>
            <tbody id="reworkStockBody"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCAOXbPwuFR3wh1QSLBXWsodupKWoRYmqs", databaseURL: "https://gvm-stock-control-default-rtdb.firebaseio.com", projectId: "gvm-stock-control" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function logout() { localStorage.removeItem('activeSession'); window.location.href = 'login.html'; }

    let catalog = [], inbound = [], reworkInbound = [], outward = [], bomList = [];
    const cleanStr = (str) => String(str || "").trim().toUpperCase();
    function safeArr(val) { return val ? Object.values(val) : []; }

    function switchLedgerTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.ledger-tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    database.ref('systemMasterCatalogFlat').on('value', (s) => { catalog = safeArr(s.val()); calculate(); });
    database.ref('freshStockVouchers').on('value', (s) => { inbound = safeArr(s.val()); calculate(); });
    database.ref('reworkStockVouchers').on('value', (s) => { reworkInbound = safeArr(s.val()); calculate(); });
    database.ref('gateoutStockData').on('value', (s) => { outward = safeArr(s.val()); calculate(); });
    database.ref('bomMasterData').on('value', (s) => { bomList = safeArr(s.val()); calculate(); });

    function calculate() { renderPoLedgerTable(); renderPhysicalStockTable(); renderReworkStockTable(); }

    function renderPoLedgerTable() {
        const tbody = document.getElementById('poLedgerItemsBody'); tbody.innerHTML = '';
        catalog.forEach(c => {
            if(!c.poNumber) return;
            tbody.innerHTML += `<tr><td><code>${c.poNumber}</code></td><td><code>${c.code}</code></td><td>${c.name}</td><td>${c.poTotalQty} ${c.poUnit || 'NOS'}</td><td>-</td><td>-</td><td>Active</td></tr>`;
        });
    }

    function renderPhysicalStockTable() {
        const tbody = document.getElementById('physicalStockBody'); tbody.innerHTML = '';
        let stockMap = {};
        inbound.forEach(v => safeArr(v.gridItems).forEach(i => {
            let code = cleanStr(i.modelCode);
            if(!stockMap[code]) stockMap[code] = { name: i.modelName, qty: 0, unit: i.unit || 'NOS' };
            stockMap[code].qty += parseInt(i.qty || 0);
        }));
        for(let code in stockMap) {
            tbody.innerHTML += `<tr><td><code>${code}</code></td><td>${stockMap[code].name}</td><td>${stockMap[code].qty} ${stockMap[code].unit}</td><td>0</td><td>${stockMap[code].qty} ${stockMap[code].unit}</td></tr>`;
        }
    }

    function renderReworkStockTable() {
        const tbody = document.getElementById('reworkStockBody'); tbody.innerHTML = '';
        let rwMap = {};
        reworkInbound.forEach(v => safeArr(v.gridItems).forEach(i => {
            if(cleanStr(i.pool) === 'REWORK') {
                let code = cleanStr(i.itemShort);
                if(!rwMap[code]) rwMap[code] = { name: i.itemName, qty: 0, unit: i.unit || 'NOS' };
                rwMap[code].qty += parseInt(i.qty || 0);
            }
        }));
        for(let code in rwMap) {
            tbody.innerHTML += `<tr><td><code>${code}</code></td><td>${rwMap[code].name}</td><td>${rwMap[code].qty} ${rwMap[code].unit}</td><td>0</td><td>${rwMap[code].qty} ${rwMap[code].unit}</td></tr>`;
        }
    }
</script>
</body>
</html>

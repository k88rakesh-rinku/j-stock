<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Ledger - GVM Rail</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        .table-filter-panel { display: flex; justify-content: space-between; align-items: center; background: #f1f5f9; padding: 15px; border-radius: 6px; margin: 20px 0; gap: 10px; }
        .btn-quick-view { background: #0284c7; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: #fff; margin: 5% auto; padding: 20px; width: 90%; border-radius: 8px; max-height: 80vh; overflow-y: auto; }
        .action-btns { margin-bottom: 10px; display: flex; gap: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="erp-header"><h1>📊 Master Ledger & History</h1><button class="logout-btn" onclick="logout()">Logout</button></div>
    
    <div class="table-filter-panel">
        <h3 style="margin:0;">📋 PO Matrix</h3>
        <div>
            <select id="poTypeFilter" class="limit-dropdown-select">
                <option value="ALL">All Types</option>
                <option value="PURCHASE">Purchase</option>
                <option value="SALE">Sale</option>
            </select>
            <input type="text" id="poSearchBox" class="sub-filter-box" placeholder="Search PO or Company...">
            <button class="btn-search-trigger" onclick="renderPOBalanceTable()">Search</button>
        </div>
    </div>
    
    <div class="table-responsive">
        <table class="history-table" id="ledgerTable" style="border: 2px solid #1e3a8a;">
            <thead style="background-color: #1e3a8a; color: white;">
                <tr><th>PO Number</th><th>Type</th><th>Code</th><th>Item</th><th>Ordered</th><th>Executed</th><th>Pending</th><th>Action</th></tr>
            </thead>
            <tbody id="poLedgerBody"></tbody>
        </table>
    </div>
</div>

<div id="historyModal" class="modal">
    <div class="modal-content">
        <div class="action-btns">
            <h2 id="modalTitle">History Log</h2>
            <button onclick="exportModalToExcel()">📥 Download Excel</button>
            <button onclick="printModal()">🜁 Print</button>
            <button onclick="closeModal()">Close</button>
        </div>
        <table class="history-table" style="width:100%;">
            <thead><tr><th>Date</th><th>Type</th><th>Ref</th><th>Qty</th></tr></thead>
            <tbody id="modalBody"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCAOXbPwuFR3wh1QSLBXWsodupKWoRYmqs", databaseURL: "https://gvm-stock-control-default-rtdb.firebaseio.com", projectId: "gvm-stock-control" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let freshData = [], gateoutData = [], flatCatalogPOList = [];
    let currentModalRows = []; // ये डेटा एक्सेल के लिए होल्ड करेगा

    Promise.all([
        database.ref('freshStockVouchers').once('value'),
        database.ref('gateoutStockData').once('value'),
        database.ref('systemMasterCatalogFlat').once('value')
    ]).then(s => {
        freshData = s[0].val() ? Object.values(s[0].val()) : [];
        gateoutData = s[1].val() ? Object.values(s[1].val()) : [];
        flatCatalogPOList = s[2].val() ? Object.values(s[2].val()) : [];
        renderPOBalanceTable();
    });

    function renderPOBalanceTable() {
        const poBody = document.getElementById('poLedgerBody');
        const search = document.getElementById('poSearchBox').value.toUpperCase();
        const typeFilter = document.getElementById('poTypeFilter').value;
        poBody.innerHTML = '';
        
        flatCatalogPOList.filter(x => x.hasPO === "YES").forEach(p => {
            if((typeFilter === "ALL" || p.poType === typeFilter) && (p.poNumber.toUpperCase().includes(search) || p.company.toUpperCase().includes(search))) {
                let executedQty = 0;
                if (p.poType === "PURCHASE") {
                    freshData.forEach(f => { if (f.poNo && f.poNo.toUpperCase() === p.poNumber.toUpperCase() && f.gridItems) f.gridItems.forEach(gi => { if(gi.modelCode.toUpperCase() === p.code.toUpperCase()) executedQty += parseInt(gi.qty || 0); }); });
                } else {
                    gateoutData.forEach(g => { if(g.gridItems) g.gridItems.forEach(gi => { if(gi.poNumber && gi.poNumber.toUpperCase() === p.poNumber.toUpperCase() && gi.code.toUpperCase() === p.code.toUpperCase()) executedQty += parseInt(gi.qty || 0); }); });
                }
                poBody.innerHTML += `<tr><td>${p.poNumber}</td><td>${p.poType}</td><td>${p.code}</td><td>${p.name}</td><td>${p.poTotalQty}</td><td>${executedQty}</td><td>${p.poTotalQty - executedQty}</td><td><button class="btn-quick-view" onclick="showHistory('${p.code}')">View</button></td></tr>`;
            }
        });
    }

    function showHistory(code) {
        document.getElementById('historyModal').style.display = 'block';
        document.getElementById('modalTitle').innerText = "History for: " + code;
        const body = document.getElementById('modalBody');
        body.innerHTML = '';
        currentModalRows = [['Date', 'Type', 'Ref', 'Qty']];

        freshData.forEach(f => { if(f.gridItems) f.gridItems.forEach(gi => { if(gi.modelCode.toUpperCase() === code.toUpperCase()) { body.innerHTML += `<tr><td>${f.gateInDate}</td><td>FRESH IN</td><td>${f.billNo}</td><td>${gi.qty}</td></tr>`; currentModalRows.push([f.gateInDate, "FRESH IN", f.billNo, gi.qty]); }}); });
        gateoutData.forEach(g => { if(g.gridItems) g.gridItems.forEach(gi => { if(gi.code && gi.code.toUpperCase() === code.toUpperCase()) { body.innerHTML += `<tr><td>${g.date}</td><td>DISPATCH</td><td>${g.voucherNo}</td><td>-${gi.qty}</td></tr>`; currentModalRows.push([g.date, "DISPATCH", g.voucherNo, -gi.qty]); }}); });
    }

    function exportModalToExcel() {
        let csv = currentModalRows.map(r => r.join(",")).join("\n");
        let blob = new Blob(["\uFEFF"+csv], {type: "text/csv"});
        let link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "History.csv"; link.click();
    }

    function closeModal() { document.getElementById('historyModal').style.display = 'none'; }
    function printModal() { window.print(); }
    function logout() { localStorage.removeItem('activeSession'); window.location.href = 'login.html'; }
</script>
</body>
</html>

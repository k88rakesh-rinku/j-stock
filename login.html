<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Authentication</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body style="background-color: #0f172a;">

<div class="login-wrapper" style="margin-top: 120px;">
    <h2>j stock - ERP Login</h2>
    <div style="background-color: #f8d7da; color: #721c24; font-weight: bold; text-align: center; margin-bottom: 15px; padding: 10px; border-radius: 4px; border: 1px solid #f5c6cb; display: none;" id="loginError">
        ❌ Access Denied: Invalid ID or Password!
    </div>
    
    <div class="form-group" style="margin-bottom: 18px;">
        <label>User ID</label>
        <input type="text" id="loginUser" required autocomplete="off" style="text-transform:lowercase;">
    </div>
    <div class="form-group" style="margin-bottom: 25px;">
        <label>Password</label>
        <input type="password" id="loginPassword" required>
    </div>
    <button class="login-btn" onclick="checkLogin()">Authenticate</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCAOXbPwuFR3wh1QSLBXWsodupKWoRYmqs",
        authDomain: "gvm-stock-control.firebaseapp.com",
        databaseURL: "https://gvm-stock-control-default-rtdb.firebaseio.com",
        projectId: "gvm-stock-control",
        storageBucket: "gvm-stock-control.firebasestorage.app",
        messagingSenderId: "202991207119",
        appId: "1:202991207119:web:2246ffb7b92f9eb0c4adba"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function checkLogin() {
        const u = document.getElementById('loginUser').value.trim().toLowerCase();
        const p = document.getElementById('loginPassword').value;
        const err = document.getElementById('loginError');
        err.style.display = 'none';

        if (!u || !p) { alert("Please enter both User ID and Password!"); return; }

        // Master Admin Clear Bypass
        if (u === "k88rakesh" && p === "Rinku@7004") {
            const sessionObj = {
                userId: u,
                // Purani aur nayi dono permissions keys de rahe hain takki koi bhi page block na kare
                permissions: { fresh: true, rework: true, gateout: true, debit: true, code: true, users: true, add: true, debitNote: true, excel: true, gencode: true }
            };
            localStorage.setItem('activeSession', JSON.stringify(sessionObj));
            
            // Backup admin on cloud
            database.ref('systemUserRegistry').once('value').then((snap) => {
                let found = false;
                const d = snap.val();
                if(d) { for(let k in d) { if(d[k].userId === "k88rakesh") found = true; } }
                if(!found) {
                    database.ref('systemUserRegistry').push({
                        name: "Rakesh Kumar", userId: "k88rakesh", password: "Rinku@7004",
                        permissions: { add: true, debit: true, excel: true, gencode: true, users: true }
                    });
                }
            });

            window.location.href = 'index.html'; 
            return;
        }

        // Staff Users Live Checking
        database.ref('systemUserRegistry').once('value').then((snapshot) => {
            const usersData = snapshot.val();
            let isAuthenticated = false;
            let loggedInUser = null;

            if(usersData) {
                for(let key in usersData) {
                    if(usersData[key].userId === u && usersData[key].password === p) {
                        isAuthenticated = true;
                        loggedInUser = usersData[key];
                        break;
                    }
                }
            }

            if(isAuthenticated && loggedInUser) {
                let prm = loggedInUser.permissions || {};
                const sessionObj = {
                    userId: loggedInUser.userId,
                    permissions: {
                        fresh: !!prm.add, rework: !!prm.add, gateout: !!prm.add,
                        debit: !!prm.debit, code: !!prm.gencode, users: !!prm.users,
                        add: !!prm.add, excel: !!prm.excel, gencode: !!prm.gencode
                    }
                };
                localStorage.setItem('activeSession', JSON.stringify(sessionObj));
                window.location.href = 'index.html';
            } else {
                err.style.display = 'block';
            }
        }).catch((e) => { err.style.display = 'block'; });
    }

    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') { checkLogin(); }
    });
</script>
</body>
</html>
